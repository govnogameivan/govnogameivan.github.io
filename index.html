<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Clicker | dev: dankert</title>

                <style>
                        body { 
                                    margin: 0; 
                                                background: #1a1a2e; 
                                                            color: white; 
                                                                        font-family: 'Segoe UI', sans-serif; 
                                                                                    display: flex; 
                                                                                                flex-direction: column; 
                                                                                                            align-items: center; 
                                                                                                                        height: 100vh; 
                                                                                                                                    overflow: hidden;
                                                                                                                                            }

                                                                                                                                                    #ui { margin-top: 40px; text-align: center; }
                                                                                                                                                            #money { font-size: 48px; font-weight: bold; color: #4ecca3; }
                                                                                                                                                                    #mps { font-size: 16px; color: #95a5a6; }

                                                                                                                                                                            #main-button {
                                                                                                                                                                                        margin-top: 50px; width: 200px; height: 200px;
                                                                                                                                                                                                    background: #e94560; border: 8px solid #533440;
                                                                                                                                                                                                                border-radius: 50%; cursor: pointer;
                                                                                                                                                                                                                            box-shadow: 0 10px 0 #941126, 0 20px 30px rgba(0,0,0,0.5);
                                                                                                                                                                                                                                        display: flex; justify-content: center; align-items: center;
                                                                                                                                                                                                                                                    font-size: 22px; font-weight: bold; text-transform: uppercase;
                                                                                                                                                                                                                                                                transition: transform 0.05s;
                                                                                                                                                                                                                                                                            user-select: none;
                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                            #main-button:active {
                                                                                                                                                                                                                                                                                                        transform: translateY(8px);
                                                                                                                                                                                                                                                                                                                    box-shadow: 0 2px 0 #941126, 0 5px 10px rgba(0,0,0,0.5);
                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                    #shop {
                                                                                                                                                                                                                                                                                                                                                position: absolute; bottom: 70px; width: 90%;
                                                                                                                                                                                                                                                                                                                                                            background: #16213e; padding: 15px; border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                            .upgrade {
                                                                                                                                                                                                                                                                                                                                                                                        background: #0f3460; padding: 12px; border-radius: 8px;
                                                                                                                                                                                                                                                                                                                                                                                                    display: flex; justify-content: space-between; align-items: center;
                                                                                                                                                                                                                                                                                                                                                                                                                border: 1px solid #4ecca3;
                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                .upgrade:active { background: #1a1a2e; }
                                                                                                                                                                                                                                                                                                                                                                                                                                        .price { color: #f1c40f; font-weight: bold; }

                                                                                                                                                                                                                                                                                                                                                                                                                                                footer {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            position: absolute;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        bottom: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    font-size: 12px;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                color: #777;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            opacity: 0.7;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="ui">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="money">0</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div id="mps">Доход: 0/сек</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div id="main-button">ТАПАЙ</div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div id="shop">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="upgrade" id="buy-auto">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div>
